        <button class="center-button" onclick="

    let opcion3 = document.querySelector('#num3').value;
    let codigo = opcion + opcion2 + opcion3;

    if (codigo === contraseña1 || codigo === contraseña2) {
        document.querySelector('#mensaje').textContent = 'Contraseña correcta';
    } else if (codigo === '000') {
        document.querySelector('#mensaje').textContent = 'Por favor selecciona una contraseña';
